<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="Kevin Darrell — Software Engineer">
  <defs>
    <style>
      .name { font-family: 'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 900; }
      .sans { font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 700; }
      .mono { font-family: 'SFMono-Regular','Consolas','Liberation Mono',Menlo,monospace; }
    </style>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#181818" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background + subtle grid texture -->
  <rect width="900" height="320" fill="#0a0a0a"/>
  <rect width="900" height="320" fill="url(#grid)"/>

  <!-- thick brutalist outer frame -->
  <rect x="10" y="10" width="880" height="300" fill="none" stroke="#fafafa" stroke-width="4"/>

  <!-- tiny path label -->
  <text x="46" y="50" class="mono" font-size="13" fill="#6b6b6b" letter-spacing="4">// ~/kevin-darrell — whoami</text>

  <!-- sliding accent blocks (top-right) -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="130 0;0 0" begin="0.15s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.6s" fill="freeze"/>
    <rect x="726" y="34" width="26" height="26" fill="#fafafa"/>
    <rect x="758" y="34" width="26" height="26" fill="#fafafa"/>
    <rect x="790" y="34" width="26" height="26" fill="#fafafa" opacity="0.55"/>
    <rect x="822" y="34" width="26" height="26" fill="#fafafa" opacity="0.28"/>
  </g>

  <!-- name -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="-45 0;0 0" begin="0s" dur="0.65s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0s" dur="0.65s" fill="freeze"/>
    <text x="44" y="136" class="name" font-size="70" fill="#fafafa" letter-spacing="1">KEVIN DARRELL</text>
  </g>

  <!-- divider that draws in from the left -->
  <rect x="46" y="160" height="5" fill="#fafafa">
    <animate attributeName="width" values="0;808" begin="0.3s" dur="0.7s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
  </rect>

  <!-- inverted role bar sliding from the left -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="-520 0;0 0" begin="0.5s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.6s" fill="freeze"/>
    <rect x="46" y="184" width="342" height="46" fill="#fafafa"/>
    <text x="64" y="216" class="sans" font-size="24" fill="#0a0a0a" letter-spacing="3">SOFTWARE ENGINEER</text>
  </g>

  <!-- tag chips -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.95s" dur="0.5s" fill="freeze"/>
    <rect x="406" y="186" width="126" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="469" y="213" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">SYSTEMS</text>
    <rect x="544" y="186" width="126" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="607" y="213" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">BACKEND</text>
    <rect x="682" y="186" width="110" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="737" y="213" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">SCALE</text>
  </g>

  <!-- tagline with blinking cursor -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.15s" dur="0.6s" fill="freeze"/>
    <text x="46" y="284" class="mono" font-size="20" fill="#d0d0d0">&gt; I build systems that think.</text>
    <rect x="372" y="268" width="12" height="21" fill="#fafafa">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
  </g>
</svg>
