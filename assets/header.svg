<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360" role="img" aria-label="Kevin Darrell — Software Engineer">
  <defs>
    <style>
      .name { font-family: 'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 900; }
      .sans { font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 700; }
      .mono { font-family: 'SFMono-Regular','Consolas','Liberation Mono',Menlo,monospace; }
    </style>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#181818" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- backdrop + subtle grid -->
  <rect width="900" height="360" fill="#0a0a0a"/>
  <rect width="900" height="360" fill="url(#grid)"/>

  <!-- outer frame -->
  <rect x="10" y="10" width="880" height="340" fill="none" stroke="#fafafa" stroke-width="3"/>

  <!-- corner brackets (fade in first) -->
  <g fill="none" stroke="#fafafa" stroke-width="4" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0s" dur="0.5s" fill="freeze"/>
    <path d="M26 54 V26 H54"/>
    <path d="M846 26 H874 V54"/>
    <path d="M26 306 V334 H54"/>
    <path d="M846 334 H874 V306"/>
  </g>

  <!-- path label -->
  <text x="48" y="52" class="mono" font-size="13" fill="#6b6b6b" letter-spacing="4" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.5s" fill="freeze"/>// ~/kevin-darrell — whoami
  </text>

  <!-- accent blocks slide in from the right -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="130 0;0 0" begin="0.2s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.6s" fill="freeze"/>
    <rect x="726" y="36" width="24" height="24" fill="#fafafa"/>
    <rect x="756" y="36" width="24" height="24" fill="#fafafa"/>
    <rect x="786" y="36" width="24" height="24" fill="#fafafa" opacity="0.55"/>
    <rect x="816" y="36" width="24" height="24" fill="#fafafa" opacity="0.28"/>
  </g>

  <!-- name -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="-45 0;0 0" begin="0.15s" dur="0.65s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0.15s" dur="0.65s" fill="freeze"/>
    <text x="46" y="150" class="name" font-size="70" fill="#fafafa" letter-spacing="1">KEVIN DARRELL</text>
  </g>

  <!-- divider drawing in from the left -->
  <rect x="48" y="174" height="5" fill="#fafafa">
    <animate attributeName="width" values="0;804" begin="0.4s" dur="0.7s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
  </rect>

  <!-- inverted role bar -->
  <g opacity="0">
    <animateTransform attributeName="transform" type="translate" values="-520 0;0 0" begin="0.6s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze"/>
    <rect x="48" y="196" width="342" height="46" fill="#fafafa"/>
    <text x="66" y="228" class="sans" font-size="24" fill="#0a0a0a" letter-spacing="3">SOFTWARE ENGINEER</text>
  </g>

  <!-- tag chips -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.0s" dur="0.5s" fill="freeze"/>
    <rect x="408" y="198" width="120" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="468" y="225" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">CODE</text>
    <rect x="542" y="198" width="120" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="602" y="225" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">BUILD</text>
    <rect x="676" y="198" width="120" height="42" fill="none" stroke="#fafafa" stroke-width="2"/>
    <text x="736" y="225" class="mono" font-size="14" fill="#fafafa" text-anchor="middle" letter-spacing="2">SHIP</text>
  </g>

  <!-- tagline with blinking cursor (auto-positioned right after the period) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.6s" fill="freeze"/>
    <text x="48" y="296" class="mono" font-size="20" fill="#d0d0d0">&gt; I build systems that think.<tspan fill="#fafafa" dx="5">&#9608;<animate attributeName="fill-opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" begin="1.7s"/></tspan></text>
  </g>

  <!-- bottom meta strip -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="1.4s" dur="0.6s" fill="freeze"/>
    <circle cx="54" cy="326" r="4" fill="#fafafa"/>
    <text x="66" y="331" class="mono" font-size="13" fill="#8a8a8a" letter-spacing="2">AVAILABLE FOR WORK&#160;&#160;&#160;·&#160;&#160;&#160;BUILDING GOOD SOFTWARE&#160;&#160;&#160;·&#160;&#160;&#160;UTC+7</text>
  </g>
</svg>
