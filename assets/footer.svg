<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 170" width="900" height="170" role="img" aria-label="Let's build something that thinks">
  <defs>
    <style>
      .sans { font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-weight: 700; }
      .mono { font-family: 'SFMono-Regular','Consolas','Liberation Mono',Menlo,monospace; }
    </style>
    <pattern id="gridf" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#181818" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="170" fill="#0a0a0a"/>
  <rect width="900" height="170" fill="url(#gridf)"/>
  <rect x="10" y="10" width="880" height="150" fill="none" stroke="#fafafa" stroke-width="3"/>

  <!-- corner brackets -->
  <g fill="none" stroke="#fafafa" stroke-width="4" opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0s" dur="0.5s" fill="freeze"/>
    <path d="M26 54 V26 H54"/>
    <path d="M846 26 H874 V54"/>
    <path d="M26 116 V144 H54"/>
    <path d="M846 144 H874 V116"/>
  </g>

  <!-- headline -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.6s" fill="freeze"/>
    <text x="48" y="78" class="sans" font-size="34" fill="#fafafa" letter-spacing="1">LET'S BUILD SOMETHING</text>
    <text x="48" y="118" class="sans" font-size="34" fill="#fafafa" letter-spacing="1">THAT</text>
    <rect x="150" y="88" width="182" height="40" fill="#fafafa"/>
    <text x="168" y="118" class="sans" font-size="34" fill="#0a0a0a" letter-spacing="1">THINKS.</text>
    <rect x="340" y="92" width="15" height="32" fill="#fafafa">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite" begin="1s"/>
    </rect>
  </g>

  <!-- right meta -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze"/>
    <text x="852" y="74" text-anchor="end" class="mono" font-size="14" fill="#fafafa" letter-spacing="2">KEVIN DARRELL</text>
    <text x="852" y="98" text-anchor="end" class="mono" font-size="12" fill="#6b6b6b" letter-spacing="2">SOFTWARE ENGINEER</text>
    <text x="852" y="128" text-anchor="end" class="mono" font-size="12" fill="#6b6b6b" letter-spacing="2">// thanks for scrolling</text>
  </g>
</svg>
