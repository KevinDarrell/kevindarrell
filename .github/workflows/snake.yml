name: Generate Snake Animation

on:
  # Run automatically once a day so the snake stays up to date
  schedule:
    - cron: "0 0 * * *"
  # Allow running it manually from the Actions tab
  workflow_dispatch:
  # Also run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs (monochrome)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%23111111&color_dots=%23ebedf0,%23b0b0b0,%23787878,%23414141,%23111111
            dist/github-snake-dark.svg?color_snake=%23e6e6e6&color_dots=%23161b22,%23404040,%23707070,%23a0a0a0,%23e6e6e6

      - name: Push to the "output" branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
